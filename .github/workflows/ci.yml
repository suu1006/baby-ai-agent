name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: TypeScript 타입 체크
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci --legacy-peer-deps

      - name: TypeScript 타입 체크
        run: npx tsc --noEmit

      - name: 테스트 실행
        run: npm test -- --passWithNoTests
